<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>心怡外卖点单</title>
<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #f5f5f5;
}

header {
  background: linear-gradient(135deg, #ff7a00, #ff4d4f);
  color: white;
  padding: 16px;
  font-size: 20px;
  font-weight: bold;
  text-align: center;
}

.container {
  padding: 12px;
}

.card {
  background: white;
  border-radius: 12px;
  margin-bottom: 12px;
  display: flex;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.card img {
  width: 100px;
  height: 100px;
  object-fit: cover;
}

.info {
  flex: 1;
  padding: 10px;
}

.title {
  font-size: 16px;
  font-weight: bold;
}

.desc {
  font-size: 12px;
  color: #666;
  margin: 4px 0;
}

.price {
  color: #ff4d4f;
  font-weight: bold;
}

.add {
  width: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
}

.add button {
  background: #ff4d4f;
  color: white;
  border: none;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
}

.cart {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border-top: 1px solid #eee;
}

.cart .total {
  font-size: 18px;
  font-weight: bold;
}

.cart button {
  background: #ff4d4f;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 20px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>
<body>

<header>🍜 心怡专属点单</header>

<div class="container" id="menu"></div>

<div class="cart">
  <div class="total">总价: ￥<span id="total">0</span></div>
  <button onclick="checkout()">去结算</button>
</div>

<script>
const foods = [
  { name: "奶茶", price: 15, desc: "香甜顺滑", img: "images/milk-tea.jpg" },
  { name: "炸鸡", price: 25, desc: "外酥里嫩", img: "images/fried-chicken.jpg" },
  { name: "寿司", price: 30, desc: "新鲜美味", img: "images/sushi.jpg" },
  { name: "火锅", price: 60, desc: "暖心暖胃", img: "images/hotpot.jpg" },
  { name: "蛋糕", price: 45, desc: "甜甜幸福", img: "images/cake.jpg" },
  { name: "水果", price: 20, desc: "健康清爽", img: "images/fruits.jpg" }
];

let total = 0;
const menu = document.getElementById("menu");

foods.forEach(food => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <img src="${food.img}" alt="">
    <div class="info">
      <div class="title">${food.name}</div>
      <div class="desc">${food.desc}</div>
      <div class="price">￥${food.price} <span style="font-size:12px;color:#999;">（黄浩买单）</span></div>
    </div>
    <div class="add">
      <button onclick="add(${food.price})">+</button>
    </div>
  `;

  menu.appendChild(div);
});

function add(price) {
  total += price;
  document.getElementById("total").innerText = total;
}

function checkout() {
  alert("❤️ 已下单成功！\n总金额：￥" + total);
}
</script>

</body>
</html>
